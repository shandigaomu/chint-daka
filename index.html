<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>打卡助手</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: #f6f7fb;
        color: #111;
      }
      .wrap {
        max-width: 720px;
        margin: 0 auto;
        padding: 20px 16px;
      }
      h1 {
        font-size: 20px;
        text-align: center;
        margin: 8px 0 16px;
      }
      .row {
        display: flex;
        gap: 10px;
        justify-content: center;
        flex-wrap: wrap;
      }
      button {
        cursor: pointer;
        padding: 12px 18px;
        border: 1px solid #d0d0d0;
        border-radius: 10px;
        background: #fff;
        font-size: 14px;
      }
      button:disabled {
        cursor: not-allowed;
        opacity: 0.6;
      }
      .card {
        margin-top: 16px;
        background: #fff;
        border: 1px solid #e6e6e6;
        border-radius: 14px;
        padding: 14px;
      }
      #statusText {
        text-align: center;
        color: #666;
        line-height: 1.4;
        margin: 8px 0 6px;
        min-height: 22px;
        white-space: pre-wrap;
      }
      .title {
        font-size: 14px;
        color: #333;
        margin: 10px 0;
      }
      #logList {
        list-style: none;
        padding: 0;
        margin: 0;
        display: flex;
        flex-direction: column;
        gap: 8px;
        max-height: 420px;
        overflow: auto;
      }
      #logList li {
        border-radius: 10px;
        padding: 10px 12px;
        background: #fafafa;
        border: 1px solid #ededed;
        font-size: 13px;
        color: #111;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>打卡助手</h1>

      <div class="row">
        <button id="btnWork">上班打卡</button>
        <button id="btnOff">下班打卡</button>
        <button id="btnLogs">获取记录</button>
      </div>

      <div class="card">
        <div id="statusText">暂无打卡记录</div>
        <div class="title">打卡记录列表：</div>
        <ul id="logList"></ul>
      </div>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
